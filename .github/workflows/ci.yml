name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff
      - run: ruff check --fix api/ training/ drift/
      - run: ruff check api/ training/ drift/

  schema-and-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install dependencies
        run: pip install fastapi httpx pydantic pydantic-settings pytest pytest-asyncio anyio scikit-learn xgboost lightgbm imbalanced-learn pandas numpy mlflow
      - name: Train baseline on sample data
        run: python training/train.py --model baseline --data data/sample/paysim_sample_1k.csv --output models/ci_model.pkl
      - name: Assert F2 floor on sample
        run: python scripts/check_model_contract.py models/ci_model.pkl
      - name: Run API contract tests
        env:
          MODEL_PATH: models/ci_model.pkl
        run: pytest api/tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies and train CI model
        run: |
          pip install fastapi httpx pydantic pydantic-settings scikit-learn xgboost lightgbm imbalanced-learn pandas numpy mlflow uvicorn
          python training/train.py --model baseline --data data/sample/paysim_sample_1k.csv --output models/ci_model.pkl
      - name: Build image
        run: docker build -t fraud-api:ci -f api/Dockerfile .
      - name: Smoke test container
        run: |
          docker run -d -p 8000:8000 \
            -e MODEL_PATH=models/ci_model.pkl \
            --name fraud-api-ci fraud-api:ci
          sleep 10
          curl -f http://localhost:8000/health
          docker logs fraud-api-ci
          docker stop fraud-api-ci
