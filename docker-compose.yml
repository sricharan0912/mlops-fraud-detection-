x-common-env: &common-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-fraud_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-fraud}
  MLFLOW_TRACKING_URI: http://mlflow:5000

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fraud}
      POSTGRES_USER: ${POSTGRES_USER:-fraud_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fraud_user} -d ${POSTGRES_DB:-fraud}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mlflow:
    image: python:3.12-slim
    working_dir: /mlflow
    command: >
      bash -c "pip install --quiet mlflow psycopg2-binary &&
               mlflow server
               --backend-store-uri postgresql://${POSTGRES_USER:-fraud_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-fraud}
               --default-artifact-root /mlflow/artifacts
               --host 0.0.0.0
               --port 5000"
    ports:
      - "5001:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8080:8000"
    environment:
      <<: *common-env
      MODEL_PATH: models/lgbm.pkl
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mlflow_artifacts:
